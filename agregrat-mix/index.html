<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Analisis Gradasi Agregat</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>📊 Analisis & Optimasi Gradasi Campuran Agregat</h1>

<section class="card">
  <h2>⚙️ Pengaturan</h2>

  <label>Jumlah Material</label>
  <input type="number" id="nMaterial" min="1" max="5" value="1">

  <label>Jumlah Percobaan per Material</label>
  <input type="number" id="nPercobaan" min="1" max="5" value="1">

  <button onclick="generateInputs()">Buat Input</button>
</section>

<section id="inputArea"></section>

<button class="primary" onclick="hitung()">🔍 Hitung & Optimasi</button>

<section class="card">
  <h2>🧮 Proporsi Material Optimal</h2>
  <div id="hasilProporsi"></div>
</section>

<section class="card">
  <h2>📈 Grafik Gradasi</h2>
  <canvas id="chartGradasi"></canvas>
</section>

<script src="js/app.js"></script>
</body>
</html>
